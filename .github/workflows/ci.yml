name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Configure git for semantic-release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install root dependencies (semantic-release)
        run: npm ci

      - name: Run semantic-release (bump, commit, tag, push)
        run: npx semantic-release --extends ./.github/releaserc.ci.json

      - name: Ensure .version exists when no release is cut
        run: |
          if [ ! -f .version ]; then
            sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml \
              | awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }' > .version
          fi

      - name: Read version
        id: version
        run: echo "VERSION=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.lock matches release version
        run: |
          v=$(cat .version)
          lock_v=$(grep -A1 '^name = "chatmail"$' Cargo.lock | awk -F'"' '/^version =/ { print $2; exit }')
          test -n "$lock_v" || { echo "Could not read chatmail version from Cargo.lock"; exit 1; }
          test "$lock_v" = "$v" || { echo "Cargo.lock version mismatch: $lock_v != $v"; exit 1; }
          mismatched=$(awk -v v="$v" '/^name = "chatmail/ { n=$0; getline; if ($0 !~ "^version = \"" v "\"$") print n, $0 }' Cargo.lock)
          if [ -n "$mismatched" ]; then
            echo "Cargo.lock workspace crate versions do not all match $v:"
            echo "$mismatched"
            exit 1
          fi

      - name: Upload version artifact for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-versions
          path: .version
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev pkg-config perl

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, semantic-release]
    if: always() && needs.lint.result == 'success' && (needs.semantic-release.result == 'success' || needs.semantic-release.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Sync version bump commit from semantic-release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: git pull origin main

      - name: Download computed version files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: release-versions
          path: .

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev pkg-config perl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-release

      - name: cargo build --release
        run: cargo build --release --locked --bin madmail

      - name: Read build version
        id: version
        run: |
          if [ -f .version ]; then
            echo "VERSION=$(cat .version)" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml | awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }')" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload madmail binary
        uses: actions/upload-artifact@v4
        with:
          name: madmail-linux-x86_64-${{ steps.version.outputs.VERSION }}
          path: target/release/madmail
          if-no-files-found: error
          retention-days: 30

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev pkg-config perl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test

      - name: cargo test
        run: cargo test --workspace

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build, semantic-release]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Sync version bump commit from semantic-release
        run: git pull origin main

      - name: Download computed version files
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: release-versions
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read app version
        id: version
        run: |
          if [ -f .version ]; then
            echo "VERSION=$(cat .version)" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml | awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }')" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta (Madmail)
        id: meta-madmail
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.VERSION }}

      - name: Build and Push Madmail Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-madmail.outputs.tags }}
          labels: ${{ steps.meta-madmail.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
