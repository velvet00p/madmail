name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Configure git for semantic-release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install root dependencies (semantic-release)
        run: npm ci

      - name: Run semantic-release (bump, commit, tag, push, GitHub release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --extends ./.github/releaserc.ci.json

      - name: Ensure .version exists when no release is cut
        run: |
          if [ ! -f .version ]; then
            sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml \
              | awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }' > .version
          fi

      - name: Read version
        id: version
        run: echo "VERSION=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Upload version artifact for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-versions
          path: .version
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev pkg-config perl

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, semantic-release]
    if: always() && needs.lint.result == 'success' && (needs.semantic-release.result == 'success' || needs.semantic-release.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Sync version bump commit from semantic-release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: git pull origin main

      - name: Download computed version files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: release-versions
          path: .

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev pkg-config perl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-release

      - name: cargo build --release
        run: cargo build --release --bin chatmail

      - name: Read build version
        id: version
        run: |
          if [ -f .version ]; then
            echo "VERSION=$(cat .version)" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml | awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }')" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload chatmail binary
        uses: actions/upload-artifact@v4
        with:
          name: chatmail-linux-x86_64-${{ steps.version.outputs.VERSION }}
          path: target/release/chatmail
          if-no-files-found: error
          retention-days: 30

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev pkg-config perl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test

      - name: cargo test
        run: cargo test --workspace
